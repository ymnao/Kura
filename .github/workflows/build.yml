name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app bundle
        run: ./build.sh release

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kura.app
          path: Kura.app
          retention-days: 7
